  description: 主线或重点题材

secondary_themes:
  type: list
  description: 次级关注题材

avoid_themes:
  type: list
  description: 明确回避方向

active_strategies:
  type: list
  description: 次日优先启用策略

focus_watchlist:
  type: list
  description: 次日重点观察个股

tomorrow_observation_points:
  type: list
  description: 次日盘中核心观察锚点

risk_notes:
  type: list
  description: 可能导致判断失效的风险

manual_overrides:
  type: mapping
